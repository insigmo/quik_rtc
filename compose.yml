services:
  olcrtc-server:
    build:
      context: .
      dockerfile: build/Dockerfile
    container_name: olcrtc-server
    restart: unless-stopped
    ports:
      - "8998:8998"
    volumes:
      - ./server.yaml:/app/server.yaml:ro
      - ./data:/app/data
    command: ["/app/olcrtc-server", "/app/server.yaml"]
